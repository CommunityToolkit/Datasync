name: Build Sample - TodoApp MAUI (Android / iOS)

on:
  workflow_call:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CONFIGURATION: 'Release'
  # TodoApp.MAUI.csproj targets net10.0-android;net10.0-ios, with net10.0-windows10.0.19041.0
  # conditionally appended only when building on Windows (that head is built separately in
  # build-samples-todoapp-windows.yml). Restore/build here is explicitly scoped to one mobile
  # TargetFramework per job so each runner only needs the workload for its own head.
  MauiProjectFile: 'samples/todoapp/TodoApp.MAUI/TodoApp.MAUI.csproj'
  AndroidTargetFramework: 'net10.0-android'
  iOSTargetFramework: 'net10.0-ios'

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore MAUI project (Android TFM only)
        # NOTE: 'dotnet restore' has no -f|--framework option (-f means --force there, unlike
        # 'dotnet build'). Use the MSBuild property directly to scope restore to one TFM.
        run: dotnet restore ${{ env.MauiProjectFile }} -p:TargetFramework=${{ env.AndroidTargetFramework }}

      - name: Build MAUI project (Android TFM only)
        run: >
          dotnet build ${{ env.MauiProjectFile }}
          -f ${{ env.AndroidTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

  ios:
    # iOS builds require Xcode, which is only available on macOS runners.
    # Pinned to macos-15 (rather than macos-latest) while that label migrates to macos-26
    # (see https://github.com/actions/runner-images/issues/14167, rollout through
    # 2026-07-15): macos-latest can currently land on either image at random, each with a
    # different default Xcode (16.4 vs 26.4.1). Combined with the workload-set version pin
    # below, this keeps the Xcode version this job builds against deterministic. See
    # https://github.com/CommunityToolkit/Datasync/issues/529. Revisit once we deliberately
    # upgrade to an Xcode-26-compatible workload set.
    runs-on: macos-15
    env:
      # `dotnet workload install maui-ios` alone always resolves the newest published
      # Microsoft.iOS.Sdk.net10.0_* pack. As of workload set 10.0.108, that's 26.5.10284,
      # which requires Xcode 26.5 - not installed on macos-15. Pinning to 10.0.107 (the last
      # set before the iOS/MacCatalyst/macOS/tvOS manifest moved to the 26.4/26.5 pack line;
      # see workload-set history for package id Microsoft.NET.Workloads.10.0.100 on
      # nuget.org) resolves 26.2.10233 instead, while keeping other manifests (e.g. MAUI,
      # Android) unaffected. `--version` pins only this job's `dotnet workload install`
      # invocation and the `restore`/`build` steps that follow it in the same runner - it's
      # intentionally not a repo-wide global.json pin, which would force every `dotnet`
      # invocation in the whole repo (including samples with no workload dependency at all)
      # to require this exact workload version to already be installed, breaking them on a
      # fresh runner.
      WorkloadSetVersion: '10.0.107'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios --version ${{ env.WorkloadSetVersion }}

      - name: Restore MAUI project (iOS TFM only)
        run: dotnet restore ${{ env.MauiProjectFile }} -p:TargetFramework=${{ env.iOSTargetFramework }}

      - name: Build MAUI project (iOS TFM only)
        run: >
          dotnet build ${{ env.MauiProjectFile }}
          -f ${{ env.iOSTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore
