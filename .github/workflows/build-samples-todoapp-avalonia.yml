name: Build Sample - TodoApp Avalonia

on:
  workflow_call:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CONFIGURATION: 'Release'
  # NOTE: This sample's solution (TodoApp.Avalonia.sln) also contains Android and iOS heads
  # (net10.0-android / net10.0-ios). Only the shared and Desktop (net10.0) projects are built
  # directly here, not the full .sln - the Android and iOS heads are built by their own jobs
  # below, each restoring/building its own project directly so only the workload needed for
  # that head is installed on that runner.
  SharedProjectFile: 'samples/todoapp/TodoApp.Avalonia/TodoApp.Avalonia/TodoApp.Avalonia.csproj'
  DesktopProjectFile: 'samples/todoapp/TodoApp.Avalonia/TodoApp.Avalonia.Desktop/TodoApp.Avalonia.Desktop.csproj'
  AndroidProjectFile: 'samples/todoapp/TodoApp.Avalonia/TodoApp.Avalonia.Android/TodoApp.Avalonia.Android.csproj'
  iOSProjectFile: 'samples/todoapp/TodoApp.Avalonia/TodoApp.Avalonia.iOS/TodoApp.Avalonia.iOS.csproj'

permissions:
  contents: read

jobs:
  desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore shared project
        run: dotnet restore ${{ env.SharedProjectFile }}

      - name: Build shared project
        run: >
          dotnet build ${{ env.SharedProjectFile }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

      - name: Restore desktop project
        run: dotnet restore ${{ env.DesktopProjectFile }}

      - name: Build desktop project
        run: >
          dotnet build ${{ env.DesktopProjectFile }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore Android project
        run: dotnet restore ${{ env.AndroidProjectFile }}

      - name: Build Android project
        run: >
          dotnet build ${{ env.AndroidProjectFile }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

  ios:
    # iOS builds require Xcode, which is only available on macOS runners.
    # Pinned to macos-15 (rather than macos-latest) while that label migrates to macos-26
    # (see https://github.com/actions/runner-images/issues/14167, rollout through
    # 2026-07-15): macos-latest can currently land on either image at random, each with a
    # different default Xcode (16.4 vs 26.4.1). Combined with the workload-set version pin
    # below, this keeps the Xcode version this job builds against deterministic. See
    # https://github.com/CommunityToolkit/Datasync/issues/529. Revisit once we deliberately
    # upgrade to an Xcode-26-compatible workload set.
    runs-on: macos-15
    env:
      # `dotnet workload install ios` alone always resolves the newest published
      # Microsoft.iOS.Sdk.net10.0_* pack. As of workload set 10.0.108, that's 26.5.10284,
      # which requires Xcode 26.5 - not installed on macos-15. Pinning to 10.0.107 (the last
      # set before the iOS/MacCatalyst/macOS/tvOS manifest moved to the 26.4/26.5 pack line;
      # see workload-set history for package id Microsoft.NET.Workloads.10.0.100 on
      # nuget.org) resolves 26.2.10233 instead, while keeping other manifests (e.g. Android)
      # unaffected. `--version` pins only this job's `dotnet workload install` invocation and
      # the `restore`/`build` steps that follow it in the same runner - it's intentionally
      # not a repo-wide global.json pin, which would force every `dotnet` invocation in the
      # whole repo (including samples with no workload dependency at all) to require this
      # exact workload version to already be installed, breaking them on a fresh runner.
      WorkloadSetVersion: '10.0.107'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install iOS workload
        run: dotnet workload install ios --version ${{ env.WorkloadSetVersion }}

      - name: Restore iOS project
        run: dotnet restore ${{ env.iOSProjectFile }}

      - name: Build iOS project
        run: >
          dotnet build ${{ env.iOSProjectFile }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore
