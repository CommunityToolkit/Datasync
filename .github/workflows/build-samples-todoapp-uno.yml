name: Build Sample - TodoApp Uno

# NOTE: This workflow is NOT currently wired into build-samples.yml. #506 fixed the NU1605
# restore blocker that used to affect every head (see samples/todoapp/TodoApp.Uno/global.json),
# so restore now succeeds everywhere. However, build now fails on every Skia-based head (android,
# ios, maccatalyst, browserwasm, desktop) with UXAML0001/CS1061 (EventTriggerBehavior could not
# be found) - see the `desktop` job below for details and
# https://github.com/CommunityToolkit/Datasync/issues/506 for background. Re-add the
# `todoapp-uno` job to build-samples.yml (and to all-samples-built's `needs`) once that build
# failure is resolved and every head restores AND builds cleanly.

on:
  workflow_call:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CONFIGURATION: 'Release'
  # TodoApp.Uno.csproj is a single Uno.Sdk project with a multi-head TargetFrameworks list
  # (net10.0-android;net10.0-ios;net10.0-maccatalyst;net10.0-windows10.0.26100;
  # net10.0-browserwasm;net10.0-desktop). No single runner can build every head (mobile heads
  # need Android/iOS workloads, the Windows head needs windows-latest, etc.), so each job below
  # restores/builds one head at a time, scoped via the MSBuild TargetFramework property.
  UnoProjectFile: 'samples/todoapp/TodoApp.Uno/TodoApp.Uno/TodoApp.Uno.csproj'
  AndroidTargetFramework: 'net10.0-android'
  iOSTargetFramework: 'net10.0-ios'
  MacCatalystTargetFramework: 'net10.0-maccatalyst'
  WindowsTargetFramework: 'net10.0-windows10.0.26100'
  BrowserWasmTargetFramework: 'net10.0-browserwasm'
  DesktopTargetFramework: 'net10.0-desktop'

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore Uno project (Android TFM only)
        # NOTE: 'dotnet restore' has no -f|--framework option (-f means --force there, unlike
        # 'dotnet build'). Use the MSBuild property directly to scope restore to one TFM.
        run: dotnet restore ${{ env.UnoProjectFile }} -p:TargetFramework=${{ env.AndroidTargetFramework }}

      - name: Build Uno project (Android TFM only)
        run: >
          dotnet build ${{ env.UnoProjectFile }}
          -f ${{ env.AndroidTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

  ios-maccatalyst:
    # iOS and Mac Catalyst builds both require Xcode, which is only available on macOS runners.
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install iOS and Mac Catalyst workloads
        run: dotnet workload install ios maccatalyst

      - name: Restore Uno project (iOS TFM only)
        run: dotnet restore ${{ env.UnoProjectFile }} -p:TargetFramework=${{ env.iOSTargetFramework }}

      - name: Build Uno project (iOS TFM only)
        run: >
          dotnet build ${{ env.UnoProjectFile }}
          -f ${{ env.iOSTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

      - name: Restore Uno project (Mac Catalyst TFM only)
        run: dotnet restore ${{ env.UnoProjectFile }} -p:TargetFramework=${{ env.MacCatalystTargetFramework }}

      - name: Build Uno project (Mac Catalyst TFM only)
        run: >
          dotnet build ${{ env.UnoProjectFile }}
          -f ${{ env.MacCatalystTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Uno project (Windows TFM only)
        run: dotnet restore ${{ env.UnoProjectFile }} -p:TargetFramework=${{ env.WindowsTargetFramework }}

      - name: Build Uno project (Windows TFM only)
        run: >
          dotnet build ${{ env.UnoProjectFile }}
          -f ${{ env.WindowsTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

  browserwasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install WebAssembly build tools workload
        run: dotnet workload install wasm-tools

      - name: Restore Uno project (Browser WebAssembly TFM only)
        run: dotnet restore ${{ env.UnoProjectFile }} -p:TargetFramework=${{ env.BrowserWasmTargetFramework }}

      - name: Build Uno project (Browser WebAssembly TFM only)
        run: >
          dotnet build ${{ env.UnoProjectFile }}
          -f ${{ env.BrowserWasmTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

  desktop:
    # NOTE: this head (along with every other Skia-based head in this file - android,
    # ios-maccatalyst, browserwasm) currently fails to BUILD (not restore) with:
    #   error UXAML0001: The type {using:Microsoft.Xaml.Interactions.Core}EventTriggerBehavior
    #   could not be found
    # CommunityToolkit.WinUI.Behaviors 8.2.250402 resolves
    # Uno.Microsoft.Xaml.Behaviors.Interactivity.WinUI 3.0.0-dev.17.g7c09b9114d on Skia heads
    # (confirmed via project.assets.json for desktop and browserwasm), which appears to lack the
    # Microsoft.Xaml.Interactions.Core types used in Views/TodoListPage.xaml. The `windows` job
    # below is unaffected - it resolves the real Microsoft.Xaml.Behaviors.WinUI.Managed 3.0.0
    # package instead. This is a separate, pre-existing bug from the NU1903 Tmds.DBus finding
    # below and from the NU1605 restore blocker #506 originally hit (now fixed - see
    # samples/todoapp/TodoApp.Uno/global.json) - it was never surfaced before because restore
    # always failed first. Tracked as a #506 follow-up issue.
    #
    # Restore also emits a NU1903 warning for 'Tmds.DBus' 0.16.0 (GHSA-xrw6-gwf8-vvr9 /
    # CVE-2026-39959), floated transitively via Uno.WinUI.Runtime.Skia.X11. This is harmless as a
    # CI matter today (this repo does not configure NuGet audit to fail on warnings) but is not
    # yet resolved - Uno only switches Uno.WinUI.Runtime.Skia.X11 to the patched
    # Tmds.DBus.Protocol starting at Uno.WinUI 6.0.465, which requires a major-version bump of
    # Uno.Sdk. See https://github.com/CommunityToolkit/Datasync/issues/506 for background and the
    # tracked major-version-bump follow-up issue.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Uno project (Desktop TFM only)
        run: dotnet restore ${{ env.UnoProjectFile }} -p:TargetFramework=${{ env.DesktopTargetFramework }}

      - name: Build Uno project (Desktop TFM only)
        run: >
          dotnet build ${{ env.UnoProjectFile }}
          -f ${{ env.DesktopTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore
