name: Build Sample - TodoApp Uno

on:
  workflow_call:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  # Debug (not Release): this is a build-only compile sanity check, never published/shipped.
  # Release builds pointlessly enable IL trimming/AOT machinery on some sample heads (see
  # https://github.com/CommunityToolkit/Datasync/issues/521), so all sample CI workflows build
  # Debug to avoid that overhead consistently, even where it isn't currently an issue.
  DOTNET_CONFIGURATION: 'Debug'
  # TodoApp.Uno.csproj is a single Uno.Sdk project with a multi-head TargetFrameworks list
  # (net10.0-android;net10.0-ios;net10.0-maccatalyst;net10.0-windows10.0.26100;
  # net10.0-browserwasm;net10.0-desktop). No single runner can build every head (mobile heads
  # need Android/iOS workloads, the Windows head needs windows-latest, etc.), so each job below
  # restores/builds one head at a time, scoped via the MSBuild TargetFramework property.
  UnoProjectFile: 'samples/todoapp/TodoApp.Uno/TodoApp.Uno/TodoApp.Uno.csproj'
  AndroidTargetFramework: 'net10.0-android'
  iOSTargetFramework: 'net10.0-ios'
  MacCatalystTargetFramework: 'net10.0-maccatalyst'
  WindowsTargetFramework: 'net10.0-windows10.0.26100'
  BrowserWasmTargetFramework: 'net10.0-browserwasm'
  DesktopTargetFramework: 'net10.0-desktop'

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore Uno project (Android TFM only)
        # NOTE: 'dotnet restore' has no -f|--framework option (-f means --force there, unlike
        # 'dotnet build'). Use the MSBuild property directly to scope restore to one TFM.
        run: dotnet restore ${{ env.UnoProjectFile }} -p:TargetFramework=${{ env.AndroidTargetFramework }}

      - name: Build Uno project (Android TFM only)
        run: >
          dotnet build ${{ env.UnoProjectFile }}
          -f ${{ env.AndroidTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

  ios-maccatalyst:
    # iOS and Mac Catalyst builds both require Xcode, which is only available on macOS runners.
    # Pinned to macos-15 (rather than macos-latest) while that label migrates to macos-26
    # (see https://github.com/actions/runner-images/issues/14167, rollout through
    # 2026-07-15): macos-latest can currently land on either image at random, each with a
    # different default Xcode (16.4 vs 26.4.1), and macos-15's *default* Xcode (16.4) doesn't
    # match what any currently-published net10.0 iOS SDK pack requires (see WorkloadSetVersion
    # below) - so this job also explicitly selects a non-default Xcode already installed on
    # the image (see the "Select Xcode" step) to match. See
    # https://github.com/CommunityToolkit/Datasync/issues/529 and #559. Revisit this whole job
    # once we deliberately upgrade to a newer, Xcode-26-compatible workload set.
    runs-on: macos-15
    env:
      # `dotnet workload install ios maccatalyst` alone always resolves the newest published
      # Microsoft.iOS.Sdk.net10.0_* pack. As of workload set 10.0.108, that's 26.5.10284,
      # which requires Xcode 26.5 - not installed on macos-15 (even as a non-default Xcode).
      # Pinning to 10.0.107 (the last set before the iOS/MacCatalyst/macOS/tvOS manifest moved
      # to the 26.4/26.5 pack line; see workload-set history for package id
      # Microsoft.NET.Workloads.10.0.100 on nuget.org) resolves 26.2.10233 instead, which
      # requires Xcode 26.3 - installed (non-default) on macos-15 as of image 20260629.0276.1
      # (see the "Select Xcode" step below). `--version` pins only this job's
      # `dotnet workload install` invocation and the `restore`/`build` steps that follow it in
      # the same runner - it's intentionally not a repo-wide global.json pin, which would
      # force every `dotnet` invocation in the whole repo (including samples with no workload
      # dependency at all) to require this exact workload version to already be installed,
      # breaking them on a fresh runner.
      WorkloadSetVersion: '10.0.107'
      RequiredXcodeVersion: '26.3'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Select Xcode ${{ env.RequiredXcodeVersion }}
        # macos-15 defaults to Xcode 16.4, which doesn't satisfy what the pinned iOS/Mac
        # Catalyst workload (see WorkloadSetVersion above) requires. Xcode 26.3 is already
        # installed on the image, just not selected by default - so switch to it explicitly
        # rather than installing anything extra.
        run: sudo xcode-select -s /Applications/Xcode_${{ env.RequiredXcodeVersion }}.app

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install iOS and Mac Catalyst workloads
        run: dotnet workload install ios maccatalyst --version ${{ env.WorkloadSetVersion }}

      - name: Restore Uno project (iOS TFM only)
        run: dotnet restore ${{ env.UnoProjectFile }} -p:TargetFramework=${{ env.iOSTargetFramework }}

      - name: Build Uno project (iOS TFM only)
        run: >
          dotnet build ${{ env.UnoProjectFile }}
          -f ${{ env.iOSTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

      - name: Restore Uno project (Mac Catalyst TFM only)
        run: dotnet restore ${{ env.UnoProjectFile }} -p:TargetFramework=${{ env.MacCatalystTargetFramework }}

      - name: Build Uno project (Mac Catalyst TFM only)
        run: >
          dotnet build ${{ env.UnoProjectFile }}
          -f ${{ env.MacCatalystTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Uno project (Windows TFM only)
        run: dotnet restore ${{ env.UnoProjectFile }} -p:TargetFramework=${{ env.WindowsTargetFramework }}

      - name: Build Uno project (Windows TFM only)
        run: >
          dotnet build ${{ env.UnoProjectFile }}
          -f ${{ env.WindowsTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

  browserwasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install WebAssembly build tools workload
        run: dotnet workload install wasm-tools

      - name: Restore Uno project (Browser WebAssembly TFM only)
        run: dotnet restore ${{ env.UnoProjectFile }} -p:TargetFramework=${{ env.BrowserWasmTargetFramework }}

      - name: Build Uno project (Browser WebAssembly TFM only)
        run: >
          dotnet build ${{ env.UnoProjectFile }}
          -f ${{ env.BrowserWasmTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore

  desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Uno project (Desktop TFM only)
        run: dotnet restore ${{ env.UnoProjectFile }} -p:TargetFramework=${{ env.DesktopTargetFramework }}

      - name: Build Uno project (Desktop TFM only)
        run: >
          dotnet build ${{ env.UnoProjectFile }}
          -f ${{ env.DesktopTargetFramework }}
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --no-restore
